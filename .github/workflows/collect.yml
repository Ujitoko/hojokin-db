name: Collect & Deploy

on:
  schedule:
    - cron: "0 21 * * *" # 毎日 06:00 JST
  workflow_dispatch: # 手動実行も可

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install feedparser httpx beautifulsoup4

      - name: Collect J-Net21 RSS
        run: python collector/collect_jnet21.py

      - name: Collect J-Net21 Search
        run: python collector/collect_jnet21_search.py

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data"
          else
            git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & Build
        run: npm ci && npm run build

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
